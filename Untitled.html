V<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Inteligente</title>
    
    <link rel="stylesheet" href="css/styles.css">
    
    <meta name="description" content="Catálogo optimizado sincronizado con Google Sheets">
    <meta name="theme-color" content="#ffffff">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="brand-logo">Mi Tienda</h1>
            
            <div id="auth-zone" class="auth-wrapper">
                </div>
        </div>
    </header>

    <nav class="categories-nav">
        <div id="categories-container" class="filters-scroll">
            <button class="filter-btn active" data-category="all">Todos</button>
            </div>
    </nav>

    <main class="catalog-container">
        <div id="catalog-loader" class="loader">Cargando productos...</div>
        
        <section id="products-grid" class="products-grid">
            </section>
    </main>

    <div id="product-modal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content">
            <button class="close-modal-btn" aria-label="Cerrar">&times;</button>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    
</body>
